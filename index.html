<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MindBuddy – Mental Health Companion</title>
  <meta name="description"
    content="A compassionate mental health app with AI chatbot, mood tracking, PHQ-9 screening, medication tracker, reminders, games, and clinician dashboard." />

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Inter:wght@400;500;600&display=swap"
    rel="stylesheet" />

  <!-- Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.2/dist/chart.umd.min.js"></script>

  <!-- Styles -->
  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <!-- Ambient background blobs -->
  <div class="bg-blob blob-1"></div>
  <div class="bg-blob blob-2"></div>
  <div class="bg-blob blob-3"></div>

  <!-- App Header -->
  <header class="app-header">
    <div class="header-inner">
      <div class="brand">
        <span class="brand-icon">🧠</span>
        <span class="brand-name">MindBuddy</span>
      </div>
      <div class="header-actions">
        <!-- Hamburger menu toggle -->
        <button id="sidebarToggleBtn" class="icon-btn" title="More screens" aria-label="Toggle sidebar"
          onclick="toggleSidebar()" style="order:-1;margin-right:4px;">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="3" y1="6" x2="21" y2="6"/>
            <line x1="3" y1="12" x2="21" y2="12"/>
            <line x1="3" y1="18" x2="21" y2="18"/>
          </svg>
        </button>
        <button id="themeToggleBtn" class="icon-btn" title="Toggle high-contrast mode"
          aria-label="Toggle accessibility mode">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="5" />
            <path
              d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42" />
          </svg>
        </button>
        <button id="logoutBtn" class="icon-btn logout-btn" title="Sign out" aria-label="Sign out" style="display:none">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/>
            <polyline points="16 17 21 12 16 7"/>
            <line x1="21" y1="12" x2="9" y2="12"/>
          </svg>
        </button>
        <div class="avatar" id="userAvatar">AJ</div>
      </div>
    </div>
  </header>

  <!-- Main Content Area -->
  <main id="app" class="main-content">
    <!-- Screens are injected here by app.js -->
  </main>

  <!-- Bottom Navigation — Row 1 (original 5) -->
  <nav class="bottom-nav" role="navigation" aria-label="Main navigation">
    <button class="nav-item active" data-screen="home" id="nav-home">
      <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z" />
        <polyline points="9,22 9,12 15,12 15,22" />
      </svg>
      <span>Home</span>
    </button>
    <button class="nav-item" data-screen="chat" id="nav-chat">
      <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z" />
      </svg>
      <span>Chat</span>
    </button>
    <button class="nav-item" data-screen="mood" id="nav-mood">
      <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="10" />
        <path d="M8 13s1.5 2 4 2 4-2 4-2" />
        <line x1="9" y1="9" x2="9.01" y2="9" />
        <line x1="15" y1="9" x2="15.01" y2="9" />
      </svg>
      <span>Mood</span>
    </button>
    <button class="nav-item" data-screen="phq9" id="nav-phq9">
      <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M9 11l3 3L22 4" />
        <path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11" />
      </svg>
      <span>PHQ-9</span>
    </button>
    <button class="nav-item" data-screen="dashboard" id="nav-dashboard">
      <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <rect x="3" y="3" width="7" height="7" />
        <rect x="14" y="3" width="7" height="7" />
        <rect x="14" y="14" width="7" height="7" />
        <rect x="3" y="14" width="7" height="7" />
      </svg>
      <span>Clinic</span>
    </button>
  </nav>

  <!-- ====== Left Sidebar ====== -->
  <!-- Overlay backdrop -->
  <div id="sidebarOverlay" class="sidebar-overlay" onclick="closeSidebar()"></div>

  <!-- Sidebar Panel -->
  <aside id="leftSidebar" class="left-sidebar" aria-label="Additional screens">
    <div class="sidebar-header">
      <span style="font-weight:800;font-size:16px;">🧠 More Screens</span>
      <button class="icon-btn" onclick="closeSidebar()" aria-label="Close sidebar">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>

    <!-- Wellness Tools -->
    <div class="sidebar-group-label">Wellness Tools</div>
    <button class="sidebar-item" data-screen="journal" onclick="sidebarNav('journal')">
      <svg class="sidebar-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M2 3h6a4 4 0 014 4v14a3 3 0 00-3-3H2z"/>
        <path d="M22 3h-6a4 4 0 00-4 4v14a3 3 0 013-3h7z"/>
      </svg>
      <span>Journal 📓</span>
    </button>
    <button class="sidebar-item" data-screen="sleep" onclick="sidebarNav('sleep')">
      <svg class="sidebar-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/>
      </svg>
      <span>Sleep 🌙</span>
    </button>
    <button class="sidebar-item" data-screen="breathing" onclick="sidebarNav('breathing')">
      <svg class="sidebar-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="10"/>
        <path d="M8 12s1-3 4-3 4 3 4 3-1 3-4 3-4-3-4-3z"/>
      </svg>
      <span>Breathe 🌬️</span>
    </button>
    <button class="sidebar-item" data-screen="crisis" onclick="sidebarNav('crisis')">
      <svg class="sidebar-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07A19.5 19.5 0 013.07 9.81a19.79 19.79 0 01-3.07-8.68A2 2 0 012 .82h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L6.09 8.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 16.92z"/>
      </svg>
      <span>Crisis 🆘</span>
    </button>

    <!-- Health Management -->
    <div class="sidebar-group-label" style="margin-top:16px;">Health Management</div>
    <button class="sidebar-item" data-screen="profile" onclick="sidebarNav('profile')">
      <svg class="sidebar-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/>
        <circle cx="12" cy="7" r="4"/>
      </svg>
      <span>Profile</span>
    </button>
    <button class="sidebar-item" data-screen="medications" onclick="sidebarNav('medications')">
      <svg class="sidebar-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M10.5 20H4a2 2 0 01-2-2V5c0-1.1.9-2 2-2h3.93a2 2 0 011.66.9l.82 1.2a2 2 0 001.66.9H20a2 2 0 012 2v3"/>
        <circle cx="18" cy="18" r="3"/>
      </svg>
      <span>Meds 💊</span>
    </button>
    <button class="sidebar-item" data-screen="reminders" onclick="sidebarNav('reminders')">
      <svg class="sidebar-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/>
        <path d="M13.73 21a2 2 0 01-3.46 0"/>
      </svg>
      <span>Alerts ⏰</span>
    </button>
    <button class="sidebar-item" data-screen="games" onclick="sidebarNav('games')">
      <svg class="sidebar-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <rect x="2" y="6" width="20" height="12" rx="2"/>
        <path d="M12 12h.01M17 12h.01M7 10v4M5 12h4"/>
      </svg>
      <span>Games 🎮</span>
    </button>
  </aside>

  <!-- Confetti Canvas (mood streaks) -->
  <canvas id="confettiCanvas"></canvas>

  <!-- Shared State -->
  <script src="state.js"></script>

  <!-- Supabase Client + Service -->
  <script src="supabaseClient.js"></script>
  <script src="supabase-service.js"></script>

  <!-- Scripts — Phase 1 -->
  <script src="screens/home.js"></script>
  <script src="screens/chat.js"></script>
  <script src="screens/mood.js"></script>
  <script src="screens/phq9.js"></script>
  <script src="screens/dashboard.js"></script>
  <!-- Scripts — Phase 2 -->
  <script src="screens/profile.js"></script>
  <script src="screens/medications.js"></script>
  <script src="screens/reminders.js"></script>
  <script src="screens/games.js"></script>
  <!-- Scripts — Phase 3 -->
  <script src="screens/journal.js"></script>
  <script src="screens/sleep.js"></script>
  <script src="screens/breathing.js"></script>
  <script src="screens/crisis.js"></script>
  <!-- Scripts — Phase 4 (Auth) -->
  <script src="screens/login.js"></script>
  <!-- App Router -->
  <script src="app.js"></script>
</body>

</html>
